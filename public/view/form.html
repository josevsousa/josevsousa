<!-- scripts -->
<script src="js/form/form.js" charset="utf-8"></script>

<form class="contact-form contato" >
	<h4 class="text-center description">Se preferir deixe o seu recado no formulário abaixo. Obrigado!</h4>
	<div class="row">
		<div class="col-md-6">
			<div class="form-group label-floating is-empty">
				<label class="control-label">Seu nome</label>
				<input type="text" id="nome" name="nome" class="form-control">
				<span class="material-input"></span>
			</div>
		</div>
		<div class="col-md-6">
			<div class="form-group label-floating is-empty">
				<label class="control-label">Seu Email</label>
				<input type="email" id="email" name="email" class="form-control">
				<span class="material-input"></span>
			</div>
		</div>
	</div>
	<div class="form-group label-floating is-empty">
		<label class="control-label">Sua mensagem</label>
		<textarea name="message" id="message" class="form-control" rows="4"></textarea>
		<span class="material-input"></span>
	</div>
	<div class="row">
		<div class="col-md-4 col-md-offset-4 text-center">
			<button id="enviar"  type="submit" class="btn btn-primary btn-raised">
				Enviar
			</button>
		</div>
	</div>
</form>
